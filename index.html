<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Clientes</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .button { padding: 10px 15px; margin: 5px; cursor: pointer; }
        .hidden { display: none; }
        #client-info { margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>

<h1>Visualizador de Clientes</h1>
<button id="btnLlanterama" class="button">Llanterama</button>
<button id="btnAutoelectrica" class="button">Autoelectrica</button>

<div id="vendedores" class="hidden">
    <h2>Vendedores</h2>
    <button class="button" onclick="loadVendedor('Vendedor1')">Vendedor 1</button>
    <button class="button" onclick="loadVendedor('Vendedor2')">Vendedor 2</button>
    <!-- Agrega más vendedores según sea necesario -->
</div>

<div id="client-info" class="hidden">
    <h2>Información del Cliente</h2>
    <div id="clientDetails"></div>
</div>

<script>
    const spreadsheetId = '1bT6TQaWi5K0FYYI_qw3lz5YUS7J1MyXeaJCxglVf7O4';
    const apiKey = 'TU_API_KEY_AQUÍ'; // Reemplaza con tu API Key

    document.getElementById('btnLlanterama').onclick = function() {
        document.getElementById('vendedores').classList.remove('hidden');
    };

    document.getElementById('btnAutoelectrica').onclick = function() {
        document.getElementById('vendedores').classList.remove('hidden');
    };

    function loadVendedor(vendedor) {
        fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${vendedor}?key=${apiKey}`)
            .then(response => response.json())
            .then(data => {
                displayClients(data.values);
            });
    }

    function displayClients(clients) {
        let html = '<table><tr><th>Cliente</th><th>Ventas</th><th>Objetivo</th></tr>';

        clients.forEach(client => {
            html += `<tr onclick="loadClientDetails('${client<a href="" class="citation-link" target="_blank" style="vertical-align: super; font-size: 0.8em; margin-left: 3px;">[0]</a>}')">
                        <td>${client<a href="" class="citation-link" target="_blank" style="vertical-align: super; font-size: 0.8em; margin-left: 3px;">[2]</a>}</td>
                        <td>${client<a href="" class="citation-link" target="_blank" style="vertical-align: super; font-size: 0.8em; margin-left: 3px;">[14]</a>}</td> <!-- Ventas reales -->
                        <td>${client<a href="" class="citation-link" target="_blank" style="vertical-align: super; font-size: 0.8em; margin-left: 3px;">[15]</a>}</td> <!-- Objetivo -->
                     </tr>`;
        });
        html += '</table>';
        document.getElementById('clientDetails').innerHTML = html;
        document.getElementById('client-info').classList.remove('hidden');
    }

    function loadClientDetails(clientName) {
        // Aquí puedes agregar lógica para mostrar detalles específicos del cliente
        alert(`Mostrando detalles de ${clientName}`);
    }
</script>

</body>
</html>
